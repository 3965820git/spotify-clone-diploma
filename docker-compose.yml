services:
  spotify_backend:
    container_name: spotify_backend
    build:
      context: .
      dockerfile: src/Apps/SpotifyClone.Api/Dockerfile
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__MainDb=Host=db;Port=5432;Database=spotify_main_db;Username=spotify_user;Password=spotify_password
      - ConnectionStrings__Redis=redis:6379,abortConnect=false
      # Вот оно, секретное оружие против localhost:
      - S3__StorageUrl=http://minio:9000
      - S3__ServiceUrl=http://minio:9000
      - Minio__StorageUrl=http://minio:9000
      - Minio__Endpoint=minio:9000
      - Minio__AccessKey=admin
      - Minio__SecretKey=SuperSecretPassword123
      - S3__AccessKey=admin
      - S3__SecretKey=SuperSecretPassword123
      - S3__BucketName=music-storage
    networks:
      - public_net
      - data_net
    depends_on:
      - db
      - redis
      - minio

  db:
    image: postgres:16-alpine
    container_name: spotify_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: spotify_user
      POSTGRES_PASSWORD: spotify_password
      POSTGRES_DB: spotify_main_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data_net

  redis:
    image: redis:alpine
    container_name: spotify_cache
    restart: unless-stopped
    networks:
      - data_net

  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    container_name: spotify_minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=SuperSecretPassword123
    networks:
      - public_net
      - data_net

  spotify_nginx:
    image: jc21/nginx-proxy-manager:latest
    container_name: spotify_nginx
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - ./npm-data:/data
      - ./npm-letsencrypt:/etc/letsencrypt
    networks:
      - public_net
      - data_net

networks:
  public_net:
  data_net:
    internal: true

volumes:
  postgres_data:
  npm-data:
  npm-letsencrypt:
