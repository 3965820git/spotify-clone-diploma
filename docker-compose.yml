version: '3.8'

services:
  # ==========================================
  # 1. УПРАВЛЕНИЕ (Management)
  # ==========================================
  portainer:
    image: portainer/portainer-ce:latest
    container_name: spotify_portainer
    restart: always
    ports:
      - "8000:8000"
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - public_net
      - monitor_net

  # ==========================================
  # 2. ИНФРАСТРУКТУРА (Infrastructure)
  # ==========================================
    
  # Reverse Proxy (Входная дверь)
  spotify_nginx:
    image: jc21/nginx-proxy-manager:latest
    container_name: spotify_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - ./npm-data:/data
      - ./npm-letsencrypt:/etc/letsencrypt
    networks:
      - public_net
      - data_net

  # База данных (PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: spotify_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: spotify_user
      POSTGRES_PASSWORD: spotify_password
      POSTGRES_DB: spotify_main_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data_net

  # Кэш и Очереди (Redis)
  redis:
    image: redis:alpine
    container_name: spotify_cache
    restart: unless-stopped
    networks:
      - data_net

  # Файловое хранилище (MinIO S3)
  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    container_name: spotify_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: SuperSecretPassword123
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    networks:
      - public_net
      - data_net

  # Робот для создания бакетов в MinIO
  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    networks:
      - data_net
    entrypoint: >
      /bin/sh -c "
      echo 'Ждем запуска MinIO...';
      sleep 10;
      /usr/bin/mc alias set myminio http://minio:9000 admin SuperSecretPassword123;
      /usr/bin/mc mb --ignore-existing myminio/music-storage;
      /usr/bin/mc anonymous set download myminio/music-storage;
      echo 'Бакет music-storage готов!';
      exit 0;
      "

  # ==========================================
  # 3. ПРИЛОЖЕНИЕ (Application)
  # ==========================================

  # Фронтенд (Временно отключен, так как файлов нет в этой ветке)
  # frontend:
  #   build:
  #     context: .
  #     dockerfile: frontend/Dockerfile
  #     args:
  #       NEXT_PUBLIC_API_BASE: "http://35.181.134.108:5001"
  #   container_name: spotify_frontend
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   networks:
  #     - public_net

  # Бэкенд (API)
  backend:
    build:
      context: .
      dockerfile: src/Apps/SpotifyClone.Api/Dockerfile
    container_name: spotify_backend
    restart: unless-stopped
    ports:
      - "5001:8080"
    environment:
      # Подключение к БД
      - ConnectionStrings__MainDb=Host=db;Port=5432;Database=spotify_main_db;Username=spotify_user;Password=spotify_password
      # ВАЖНО: Подключение к Redis (исправлено)
      - ConnectionStrings__Redis=redis:6379,abortConnect=false
      # Настройки среды
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      # JWT Токены
      - Jwt__SecretKey=SuperSecretKeyForDiplomaProject2026!123
      - Jwt__Issuer=SpotifyClone
      - Jwt__Audience=SpotifyClone
      - Jwt__ExpiryInMinutes=120
    depends_on:
      - db
      - redis
    networks:
      - data_net
      - public_net

  # ==========================================
  # 4. МОНИТОРИНГ (Monitoring Stack)
  # ==========================================

  prometheus:
    image: prom/prometheus:latest
    container_name: spotify_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - monitor_net

  grafana:
    image: grafana/grafana:latest
    container_name: spotify_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - monitor_net

  node_exporter:
    image: prom/node-exporter:latest
    container_name: spotify_node_exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitor_net

  loki:
    image: grafana/loki:2.9.2
    container_name: spotify_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitor_net

  promtail:
    image: grafana/promtail:latest
    container_name: spotify_promtail
    user: root  # ЭТО ВАЖНО: даем права на чтение логов
    volumes:
      - ./loki/promtail-config.yaml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro # Пробрасываем сокет
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitor_net
# ==========================================
# СЕТИ И ТОМА
# ==========================================
networks:
  public_net:
    driver: bridge
  data_net:
    driver: bridge
    internal: true
  monitor_net:
    driver: bridge

volumes:
  postgres_data:
  npm-data:
  npm-letsencrypt:
  portainer_data:
  minio_data:
  prometheus_data:
  grafana_data:
